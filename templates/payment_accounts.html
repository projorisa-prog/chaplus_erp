{% extends "base.html" %}
{% block title %}결제수단관리 - 차플러스 ERP{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">💳 결제수단관리</h1>
<div class="grid grid-cols-3 gap-6 items-start">
    <div class="bg-white rounded-lg shadow p-4">
        <h2 class="font-semibold mb-3">결제수단 추가</h2>
        <form hx-post="/api/payment_accounts/" hx-target="#pa-rows" hx-swap="innerHTML"
              hx-on::after-request="this.reset()" class="space-y-2 text-sm">
            <select name="type" class="w-full border rounded px-2 py-1.5">
                <option value="카드">카드</option>
                <option value="계좌">계좌</option>
                <option value="현금">현금</option>
            </select>
            <input name="name" placeholder="별칭 (예: 국민카드)" required class="w-full border rounded px-2 py-1.5">
            <input name="number" placeholder="카드/계좌번호" class="w-full border rounded px-2 py-1.5">
            <input name="bank_name" placeholder="은행/카드사명" class="w-full border rounded px-2 py-1.5">
            <input name="holder" placeholder="예금주/명의자" class="w-full border rounded px-2 py-1.5">
            <select name="is_active" class="w-full border rounded px-2 py-1.5">
                <option value="true">사용중</option>
                <option value="false">사용안함</option>
            </select>
            <input name="memo" placeholder="메모" class="w-full border rounded px-2 py-1.5">
            <button type="submit" class="w-full bg-slate-800 text-white rounded py-1.5">+ 추가</button>
        </form>
    </div>
    <div class="col-span-2 bg-white rounded-lg shadow p-4 overflow-x-auto">
        <table class="w-full text-sm border-collapse">
            <thead>
                <tr class="bg-gray-100 text-left text-xs text-gray-600">
                    <th class="px-2 py-2">ID</th>
                    <th class="px-2 py-2">구분</th>
                    <th class="px-2 py-2">별칭</th>
                    <th class="px-2 py-2">번호</th>
                    <th class="px-2 py-2">은행/카드사</th>
                    <th class="px-2 py-2">명의자</th>
                    <th class="px-2 py-2">상태</th>
                    <th class="px-2 py-2">메모</th>
                    <th class="px-2 py-2"></th>
                </tr>
            </thead>
            <tbody id="pa-rows">{% include '_payment_account_rows.html' %}</tbody>
        </table>
    </div>
</div>
{% endblock %}
