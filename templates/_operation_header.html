<div class="bg-white rounded-lg shadow p-4 grid grid-cols-6 gap-3 text-sm items-end">
    <div>
        <label class="text-xs text-gray-500">거래처</label>
        <select name="client_id" class="w-full border rounded px-2 py-1.5 mt-1">
            {% for c in clients %}
            <option value="{{ c.id }}" {% if c.id == o.client_id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label class="text-xs text-gray-500">행사 시작</label>
        <input name="start_datetime" value="{{ o.start_datetime or '' }}"
               placeholder="YYYY-MM-DD HH:MM"
               class="w-full border rounded px-2 py-1.5 mt-1">
    </div>
    <div>
        <label class="text-xs text-gray-500">행사 종료</label>
        <input name="end_datetime" value="{{ o.end_datetime or '' }}"
               placeholder="YYYY-MM-DD"
               class="w-full border rounded px-2 py-1.5 mt-1">
    </div>
    <div>
        <label class="text-xs text-gray-500">출발지</label>
        <input name="departure" value="{{ o.departure or '' }}"
               class="w-full border rounded px-2 py-1.5 mt-1">
    </div>
    <div>
        <label class="text-xs text-gray-500">상태</label>
        <select name="status" class="w-full border rounded px-2 py-1.5 mt-1">
            <option value="예약확정" {% if o.status == '예약확정' %}selected{% endif %}>예약확정</option>
            <option value="운행" {% if o.status == '운행' %}selected{% endif %}>운행</option>
        </select>
    </div>
    <button class="bg-slate-700 text-white rounded px-4 py-1.5 text-sm"
            hx-put="/api/operations/{{ o.id }}"
            hx-include="closest div.bg-white"
            hx-target="#operation-header"
            hx-swap="innerHTML">저장</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const startInput = document.querySelector('input[name="start_datetime"]');
    const endInput = document.querySelector('input[name="end_datetime"]');

    startInput.addEventListener('input', function(e) {
        const startValue = e.target.value;
        
        // 종료일이 비어있고, 시작일이 10자리(YYYY-MM-DD) 이상 입력되었을 때만 작동
        if (!endInput.value && startValue.length >= 10) {
            endInput.value = startValue.substring(0, 10);
        }
    });
});
</script>
